name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  # Update to match the VST3 SDK version your project targets
  VST3_SDK_VERSION: "v3.7.12_build_20"
  # Set to 'true' when signing secrets are configured
  HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' }}
  HAS_NOTARIZATION: ${{ secrets.APPLE_ID != '' }}

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-macos:
    needs: test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies via Homebrew
        run: |
          brew install boost jack fftw taglib libsndfile sqlite qt caf create-dmg

      - name: Cache VST3 SDK build
        id: cache-vst3
        uses: actions/cache@v4
        with:
          path: deps/vst3sdk
          key: vst3sdk-macos-14-${{ env.VST3_SDK_VERSION }}

      - name: Clone and build VST3 SDK
        if: steps.cache-vst3.outputs.cache-hit != 'true'
        run: |
          mkdir -p deps
          git clone --recursive --branch ${{ env.VST3_SDK_VERSION }} \
            https://github.com/steinbergmedia/vst3sdk.git deps/vst3sdk
          cd deps/vst3sdk
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF \
                -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF \
                -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF \
                ..
          cmake --build . --config Release --target sdk sdk_common sdk_hosting pluginterfaces

      - name: Configure GrooveJr
        run: |
          cd src
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DGJ_BASE_DIR=${{ github.workspace }}/deps \
                -DCAF_ROOT=$(brew --prefix caf) \
                -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
                -DGJ_ENABLE_ASAN=OFF \
                ..

      - name: Build GrooveJr
        run: cmake --build src/build --config Release

      - name: Package app bundle
        run: |
          # Bundle Qt frameworks and fix up dylib references
          macdeployqt src/build/GrooveJr.app

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PWD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Sign app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          APP="src/build/GrooveJr.app"
          if [ "$HAS_SIGNING" = "true" ]; then
            SIGN_ARGS="--sign $SIGNING_IDENTITY --timestamp --options runtime"
          else
            echo "No signing certificate configured — using ad-hoc signature"
            SIGN_ARGS="--sign -"
          fi

          # Sign every dylib and framework inside-out so Gatekeeper
          # can verify each component individually
          find "$APP/Contents/Frameworks" \
            \( -name '*.dylib' -o -name '*.framework' \) \
            -exec codesign --force $SIGN_ARGS {} \;

          # Sign the main executable last
          codesign --force $SIGN_ARGS "$APP"

      - name: Create DMG installer
        run: |
          create-dmg \
            --volname "GrooveJr" \
            --volicon "src/build/GrooveJr.app/Contents/Resources/appicon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "GrooveJr.app" 150 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "GrooveJr-macos-arm64.dmg" \
            "src/build/GrooveJr.app" \
            || true
          # create-dmg returns non-zero when --volicon file is missing;
          # fall back to a plain DMG if the styled one was not created
          if [ ! -f GrooveJr-macos-arm64.dmg ]; then
            create-dmg \
              --volname "GrooveJr" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "GrooveJr.app" 150 200 \
              --app-drop-link 450 200 \
              --no-internet-enable \
              "GrooveJr-macos-arm64.dmg" \
              "src/build/GrooveJr.app"
          fi

      - name: Sign DMG
        if: env.HAS_SIGNING == 'true'
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            GrooveJr-macos-arm64.dmg

      - name: Notarize DMG
        if: env.HAS_NOTARIZATION == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit GrooveJr-macos-arm64.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple GrooveJr-macos-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrooveJr-macos-arm64
          path: GrooveJr-macos-arm64.dmg

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrooveJr-macos-app-bundle
          path: src/build/GrooveJr.app

  e2e:
    needs: build-macos
    uses: ./.github/workflows/e2e.yml
    with:
      build_artifact_name: GrooveJr-macos-app-bundle
