name: Build

on:
  push:

env:
  VST3_SDK_VERSION: "v3.7.12_build_20"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies via Homebrew
        run: |
          brew install boost jack fftw taglib libsndfile sqlite qt caf dylibbundler

      - name: Cache VST3 SDK build
        id: cache-vst3
        uses: actions/cache@v4
        with:
          path: deps/vst3sdk
          key: vst3sdk-macos-14-${{ env.VST3_SDK_VERSION }}

      - name: Clone and build VST3 SDK
        if: steps.cache-vst3.outputs.cache-hit != 'true'
        run: |
          mkdir -p deps
          git clone --recursive --branch ${{ env.VST3_SDK_VERSION }} \
            https://github.com/steinbergmedia/vst3sdk.git deps/vst3sdk
          cd deps/vst3sdk
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF \
                -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF \
                -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF \
                ..
          cmake --build . --config Release --target sdk sdk_common sdk_hosting pluginterfaces

      - name: Configure GrooveJr
        run: |
          cd src
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DGJ_BASE_DIR=${{ github.workspace }}/deps \
                -DCAF_ROOT=$(brew --prefix caf) \
                -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
                -DGJ_ENABLE_ASAN=OFF \
                ..

      - name: Build GrooveJr
        run: cmake --build src/build --config Release

      - name: Package macOS app bundle
        run: |
          set -e

          APP="GrooveJr.app"
          CONTENTS="$APP/Contents"
          MACOS="$CONTENTS/MacOS"
          FWKS="$CONTENTS/Frameworks"

          mkdir -p "$MACOS" "$FWKS" "$CONTENTS/Resources"

          # --- Copy executable ---
          cp src/build/GrooveJr "$MACOS/"

          # --- Copy custom shared libraries ---
          find src/build -name '*.dylib' -exec cp {} "$FWKS/" \;

          # --- Create Info.plist ---
          cat > "$CONTENTS/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>GrooveJr</string>
            <key>CFBundleDisplayName</key>
            <string>GrooveJr</string>
            <key>CFBundleExecutable</key>
            <string>GrooveJr</string>
            <key>CFBundleIdentifier</key>
            <string>dev.groovejr.app</string>
            <key>CFBundleVersion</key>
            <string>0.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
          </dict>
          </plist>
          PLIST

          # --- Fix install names for custom dylibs ---
          for dylib in "$FWKS"/*.dylib; do
            name=$(basename "$dylib")
            install_name_tool -id "@executable_path/../Frameworks/$name" "$dylib"
          done

          # Fix executable references to custom dylibs
          for dylib in "$FWKS"/*.dylib; do
            name=$(basename "$dylib")
            old_path=$(otool -L "$MACOS/GrooveJr" | grep "$name" | awk '{print $1}' | head -1)
            if [ -n "$old_path" ]; then
              install_name_tool -change "$old_path" \
                "@executable_path/../Frameworks/$name" "$MACOS/GrooveJr" || true
            fi
          done

          # Fix cross-references between custom dylibs
          for dylib in "$FWKS"/*.dylib; do
            for ref in "$FWKS"/*.dylib; do
              ref_name=$(basename "$ref")
              old_path=$(otool -L "$dylib" | grep "$ref_name" | awk '{print $1}' | head -1)
              if [ -n "$old_path" ] && \
                 [ "$old_path" != "@executable_path/../Frameworks/$ref_name" ]; then
                install_name_tool -change "$old_path" \
                  "@executable_path/../Frameworks/$ref_name" "$dylib" || true
              fi
            done
          done

          # --- Add rpath so @rpath references resolve ---
          install_name_tool -add_rpath "@executable_path/../Frameworks" \
            "$MACOS/GrooveJr" 2>/dev/null || true

          # --- Bundle Qt frameworks and plugins ---
          QT_DIR="$(brew --prefix qt)"
          "$QT_DIR/bin/macdeployqt" "$APP" -always-overwrite

          # --- Bundle remaining non-Qt shared library dependencies ---
          BREW_LIB="$(brew --prefix)/lib"

          dylibbundler -od -b \
            -x "$MACOS/GrooveJr" \
            -d "$FWKS/" \
            -p "@executable_path/../Frameworks/" \
            -s "$BREW_LIB"

          for dylib in "$FWKS"/*.dylib; do
            dylibbundler -od -b \
              -x "$dylib" \
              -d "$FWKS/" \
              -p "@executable_path/../Frameworks/" \
              -s "$BREW_LIB" 2>/dev/null || true
          done

          # --- Ad-hoc code sign ---
          codesign --force --deep --sign - "$APP"

          # --- Create DMG ---
          hdiutil create -volname "GrooveJr" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "GrooveJr-macos-arm64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: GrooveJr-macos-arm64
          path: GrooveJr-macos-arm64.dmg

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: GrooveJr-macos-arm64-app
          path: GrooveJr.app
