name: E2E

on:
  workflow_call:
    inputs:
      build_artifact_name:
        description: Name of the uploaded GrooveJr app bundle artifact
        required: true
        type: string

env:
  VST3_SDK_VERSION: "v3.7.12_build_20"

permissions:
  contents: read

jobs:
  e2e-macos-artifact:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on:
      - self-hosted
      - macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GrooveJr app bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build_artifact_name }}
          path: src/build

      - name: Run E2E tests
        run: |
          cd src/build
          ctest -R gj_test_e2e --output-on-failure

