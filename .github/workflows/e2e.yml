name: E2E

on:
  workflow_call:
    inputs:
      build_artifact_name:
        description: Name of the uploaded GrooveJr app bundle artifact
        required: true
        type: string

env:
  VST3_SDK_VERSION: "v3.7.12_build_20"

permissions:
  contents: read

jobs:
  e2e-macos-artifact:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies via Homebrew
        run: brew install boost jack fftw taglib libsndfile sqlite qt caf

      - name: Cache VST3 SDK build
        id: cache-vst3
        uses: actions/cache@v4
        with:
          path: deps/vst3sdk
          key: vst3sdk-macos-14-${{ env.VST3_SDK_VERSION }}

      - name: Clone and build VST3 SDK
        if: steps.cache-vst3.outputs.cache-hit != 'true'
        run: |
          mkdir -p deps
          git clone --recursive --branch ${{ env.VST3_SDK_VERSION }} \
            https://github.com/steinbergmedia/vst3sdk.git deps/vst3sdk
          cd deps/vst3sdk
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DSMTG_ENABLE_VST3_HOSTING_EXAMPLES=OFF \
                -DSMTG_ENABLE_VST3_PLUGIN_EXAMPLES=OFF \
                -DSMTG_ENABLE_VSTGUI_SUPPORT=OFF \
                ..
          cmake --build . --config Release --target sdk sdk_common sdk_hosting pluginterfaces

      - name: Configure CMake (tests enabled)
        run: |
          cd src && mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DGJ_BUILD_TESTS=ON \
                -DGJ_ENABLE_ASAN=OFF \
                -DGJ_BASE_DIR=${{ github.workspace }}/deps \
                -DCAF_ROOT=$(brew --prefix caf) \
                -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
                ..

      - name: Build and Run E2E tests
        run: |
          cd src/build
          cmake --build . --target gj_test_e2e
          ctest -R gj_test_e2e --output-on-failure

